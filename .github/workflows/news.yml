name: 重庆新闻抓取

on:
  workflow_dispatch:
    inputs:
      date:
        description: '日期 (YYYYMMDD)，留空则抓取前一天'
        required: false
        default: ''
  schedule:
    - cron: '0 1 * * *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests beautifulsoup4

      - name: 抓取新闻
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            # 手动指定日期
            python cqnes.py "${{ inputs.date }}"
          else
            # 定时任务默认抓取前一天晚上的新闻联播
            python cqnes.py "$(date -d 'yesterday' +%Y%m%d)"
          fi

      - name: 提交新闻文件
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Cycle0258/cqnews.git
          # 拉取远程 news 分支已有内容，避免覆盖历史
          git fetch origin news || true
          git checkout news
          git pull --rebase origin news
          git add -A
          if git diff --staged --quiet; then
            echo "没有新内容，跳过提交"
          else
            git commit -m "自动提交新闻 $(date +%Y%m%d)"
            git push -u origin news
          fi
